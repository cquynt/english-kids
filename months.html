<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Learn months vocabulary in English with fun games and quizzes!">
  <title>Months – English Kids 📅</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
</head>
<body>

  <div class="bg-blobs"><span></span><span></span><span></span></div>
  <div class="sparkles"></div>

  <header class="navbar">
    <a href="index.html" class="logo">📚 English Kids</a>
    <div class="nav-right">
      <nav id="main-nav"></nav>
      <button class="dark-toggle" id="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <section class="page-header">
    <div class="emoji-icon">📅</div>
    <h1>Months</h1>
    <p>Learn months in English! Click a card to hear the word 🔊</p>
  </section>

  <div class="section-tabs">
    <button class="tab-btn active" data-tab="learn" id="tab-learn">📖 Learn</button>
    <button class="tab-btn" data-tab="match" id="tab-match">🎯 Match</button>
    <button class="tab-btn" data-tab="memory" id="tab-memory">🧠 Memory</button>
    <button class="tab-btn" data-tab="quiz" id="tab-quiz">✏️ Quiz</button>
  </div>

  <section class="content-section active" id="learn">
    <div class="flashcards" id="months-flashcards"></div>
  </section>

  <section class="content-section" id="match">
    <div id="months-match"></div>
  </section>

  <section class="content-section" id="memory">
    <div id="months-memory"></div>
  </section>

  <section class="content-section" id="quiz">
    <div id="months-quiz"></div>
  </section>

  <footer class="site-footer">
    <p>Made with ❤️ for young learners in Leipzig 🇩🇪 · Class 3 English</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const MONTHS_WORDS = [
      { word: 'January', emoji: '⛄', german: 'Januar' },
      { word: 'February', emoji: '⛸️', german: 'Februar' },
      { word: 'March', emoji: '🌱', german: 'März' },
      { word: 'April', emoji: '☔', german: 'April' },
      { word: 'May', emoji: '🚲', german: 'Mai' },
      { word: 'June', emoji: '🍦', german: 'Juni' },
      { word: 'July', emoji: '🛟', german: 'Juli' },
      { word: 'August', emoji: '🕶️', german: 'August' },
      { word: 'September', emoji: '🍎', german: 'September' },
      { word: 'October', emoji: '🧙', german: 'Oktober' },
      { word: 'November', emoji: '🪁', german: 'November' },
      { word: 'December', emoji: '⛷️', german: 'Dezember' }
    ];

    // ── Flashcards ──
    const fcContainer = document.getElementById('months-flashcards');
    MONTHS_WORDS.forEach(w => {
      const card = document.createElement('div');
      card.className = 'flashcard';
      card.innerHTML = `
        <button class="speak-btn" onclick="event.stopPropagation();speak('${w.word}')">🔊</button>
        <div class="fc-emoji">${w.emoji}</div>
        <div class="fc-word">${w.word}</div>
        <div class="fc-sub">${w.german}</div>
      `;
      card.addEventListener('click', () => { speak(w.word); trackCardClick(); });
      fcContainer.appendChild(card);
    });

    // ── Matching Game ──
    const matchPairs = shuffle([...MONTHS_WORDS]).slice(0, 8).map(w => ({
      left: w.emoji,
      right: w.word
    }));
    new MatchGame({
      containerId: 'months-match',
      pairs: matchPairs,
      topic: 'months'
    });

    // ── Memory Game ──
    const memPairs = shuffle([...MONTHS_WORDS]).slice(0, 6).map(w => ({
      emoji: w.emoji,
      word: w.word
    }));
    new MemoryGame({
      containerId: 'months-memory',
      pairs: memPairs,
      topic: 'months'
    });

    // ── Quiz ──
    function buildMonthsQuestions() {
      const qs = [];
      const picked = shuffle([...MONTHS_WORDS]).slice(0, 10);
      picked.slice(0, 5).forEach(c => {
        const wrongs = shuffle(MONTHS_WORDS.filter(x => x.word !== c.word)).slice(0, 3).map(x => x.word);
        const opts = shuffle([c.word, ...wrongs]);
        qs.push({
          prompt: 'What month is this?',
          question: c.emoji,
          options: opts,
          correct: opts.indexOf(c.word)
        });
      });
      picked.slice(5, 10).forEach(c => {
        const wrongs = shuffle(MONTHS_WORDS.filter(x => x.german !== c.german)).slice(0, 3).map(x => x.german);
        const opts = shuffle([c.german, ...wrongs]);
        qs.push({
          prompt: `What is "${c.word}" in German?`,
          question: `${c.emoji} ${c.word}`,
          options: opts,
          correct: opts.indexOf(c.german)
        });
      });
      return qs;
    }

    new QuizEngine({
      containerId: 'months-quiz',
      questions: buildMonthsQuestions(),
      topic: 'months'
    });
  </script>
</body>
</html>
