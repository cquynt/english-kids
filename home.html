<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Learn home, rooms and furniture vocabulary in English with fun games and quizzes!">
    <title>Home – English Kids 🏠</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
</head>

<body>

    <div class="bg-blobs"><span></span><span></span><span></span></div>
    <div class="sparkles"></div>

    <header class="navbar">
        <a href="index.html" class="logo">📚 English Kids</a>
        <div class="nav-right">
            <nav id="main-nav"></nav>
            <button class="dark-toggle" id="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
        </div>
    </header>

    <section class="page-header">
        <div class="emoji-icon">🏠</div>
        <h1>Home</h1>
        <p>Learn rooms and furniture words in English! Click a card to hear the word 🔊</p>
    </section>

    <div class="section-tabs">
        <button class="tab-btn active" data-tab="learn" id="tab-learn">📖 Learn</button>
        <button class="tab-btn" data-tab="match" id="tab-match">🎯 Match</button>
        <button class="tab-btn" data-tab="memory" id="tab-memory">🧠 Memory</button>
        <button class="tab-btn" data-tab="quiz" id="tab-quiz">✏️ Quiz</button>
    </div>

    <section class="content-section active" id="learn">
        <div class="flashcards" id="home-flashcards"></div>
    </section>

    <section class="content-section" id="match">
        <div id="home-match"></div>
    </section>

    <section class="content-section" id="memory">
        <div id="home-memory"></div>
    </section>

    <section class="content-section" id="quiz">
        <div id="home-quiz"></div>
    </section>

    <footer class="site-footer">
        <p>Made with ❤️ for young learners in Leipzig 🇩🇪 · Class 3 English</p>
    </footer>

    <script src="app.js"></script>
    <script>
        const HOME_WORDS = [
            { word: 'bathroom', emoji: '🛁', german: 'Badezimmer', group: 'rooms' },
            { word: 'bedroom', emoji: '🛏️', german: 'Schlafzimmer', group: 'rooms' },
            { word: "children's room", emoji: '🧸', german: 'Kinderzimmer', group: 'rooms' },
            { word: 'hall', emoji: '🚪', german: 'Flur', group: 'rooms' },
            { word: 'kitchen', emoji: '🍳', german: 'Kueche', group: 'rooms' },
            { word: 'living room', emoji: '🛋️', german: 'Wohnzimmer', group: 'rooms' },
            { word: 'upstairs', emoji: '⬆️', german: 'oben', group: 'rooms' },
            { word: 'downstairs', emoji: '⬇️', german: 'unten', group: 'rooms' },
            { word: 'house', emoji: '🏠', german: 'Haus', group: 'rooms' },

            { word: 'chair', emoji: '🪑', german: 'Stuhl', group: 'furniture' },
            { word: 'table', emoji: '🧱', german: 'Tisch', group: 'furniture' },
            { word: 'bed', emoji: '🛏️', german: 'Bett', group: 'furniture' },
            { word: 'armchair', emoji: '🪑', german: 'Sessel', group: 'furniture' },
            { word: 'sofa', emoji: '🛋️', german: 'Sofa', group: 'furniture' },
            { word: 'wardrobe', emoji: '🚪', german: 'Kleiderschrank', group: 'furniture' },
            { word: 'shelf', emoji: '🧺', german: 'Regal', group: 'furniture' },
            { word: 'cupboard', emoji: '🗄️', german: 'Schrank', group: 'furniture' },
            { word: 'fridge', emoji: '🧊', german: 'Kuehlschrank', group: 'furniture' },
            { word: 'oven', emoji: '🔥', german: 'Ofen', group: 'furniture' },
            { word: 'lamp', emoji: '💡', german: 'Lampe', group: 'furniture' },
            { word: 'TV', emoji: '📺', german: 'Fernseher', group: 'furniture' },
            { word: 'bathtub', emoji: '🛁', german: 'Badewanne', group: 'furniture' },
            { word: 'shower', emoji: '🚿', german: 'Dusche', group: 'furniture' },
            { word: 'toilet', emoji: '🚽', german: 'Toilette', group: 'furniture' },
            { word: 'washbasin', emoji: '🚰', german: 'Waschbecken', group: 'furniture' },
            { word: 'picture', emoji: '🖼️', german: 'Bild', group: 'furniture' }
        ];

        // ── Flashcards ──
        const fcContainer = document.getElementById('home-flashcards');
        HOME_WORDS.forEach(w => {
            const card = document.createElement('div');
            card.className = 'flashcard';
            card.innerHTML = `
        <button class="speak-btn" data-word="${w.word}">🔊</button>
        <div class="fc-emoji">${w.emoji}</div>
        <div class="fc-word">${w.word}</div>
        <div class="fc-sub">${w.german}</div>
      `;

            card.querySelector('.speak-btn').addEventListener('click', (event) => {
                event.stopPropagation();
                speak(w.word);
            });

            card.addEventListener('click', () => {
                speak(w.word);
                trackCardClick();
            });

            fcContainer.appendChild(card);
        });

        // ── Matching Game ──
        const matchPairs = shuffle([...HOME_WORDS]).slice(0, 8).map(w => ({
            left: w.emoji,
            right: w.word
        }));

        new MatchGame({
            containerId: 'home-match',
            pairs: matchPairs,
            topic: 'home'
        });

        // ── Memory Game ──
        const memPairs = shuffle([...HOME_WORDS]).slice(0, 6).map(w => ({
            emoji: w.emoji,
            word: w.word
        }));

        new MemoryGame({
            containerId: 'home-memory',
            pairs: memPairs,
            topic: 'home'
        });

        // ── Quiz ──
        function buildHomeQuestions() {
            const qs = [];
            const picked = shuffle([...HOME_WORDS]).slice(0, 10);

            picked.slice(0, 5).forEach(c => {
                const wrongs = shuffle(HOME_WORDS.filter(x => x.word !== c.word)).slice(0, 3).map(x => x.word);
                const opts = shuffle([c.word, ...wrongs]);

                qs.push({
                    prompt: 'What is this?',
                    question: c.emoji,
                    options: opts,
                    correct: opts.indexOf(c.word)
                });
            });

            picked.slice(5, 10).forEach(c => {
                const wrongs = shuffle(HOME_WORDS.filter(x => x.german !== c.german)).slice(0, 3).map(x => x.german);
                const opts = shuffle([c.german, ...wrongs]);

                qs.push({
                    prompt: `What is "${c.word}" in German?`,
                    question: `${c.emoji} ${c.word}`,
                    options: opts,
                    correct: opts.indexOf(c.german)
                });
            });

            return qs;
        }

        new QuizEngine({
            containerId: 'home-quiz',
            questions: buildHomeQuestions(),
            topic: 'home'
        });
    </script>
</body>

</html>
